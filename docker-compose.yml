networks:
  platform:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  loki_data:   
  grafana_data:

services:

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: platform_postgres:local
    container_name: platform_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
  pgbouncer:
    image: docker.io/bitnamilegacy/pgbouncer:latest
    container_name: platform_pgbouncer
    restart: unless-stopped
    environment:
      - POSTGRESQL_HOST=postgres
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
      - PGBOUNCER_PORT=6432
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=1000
      - PGBOUNCER_DEFAULT_POOL_SIZE= 25
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  redis:
    image: redis:7.2-alpine
    container_name: platform_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ../minikosbreb/auth-service
      dockerfile: Dockerfile
    image: platform_auth:local
    container_name: platform_auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}

    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

    
  gateway-service:
    build:
      context: ../minikosbreb/gateway-service
      dockerfile: Dockerfile
    image: platform_gateway:local
    container_name: platform_gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      AUTH_SERVICE_URL: http://auth-service:8001
      TENANT_SERVICE_URL: http://tenant-service:8002
      BILLING_SERVICE_URL: http://billing-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8004
      FLEET_SERVICE_URL: http://fleet-service:8005
      CUSTOMER_SERVICE_URL: http://customer-service:8006
      BOOKING_SERVICE_URL: http://booking-service:8007
      MEET_SERVICE_URL: http://meet-service:8008
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8001 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  tenant-service:
    build:
      context: ../minikosbreb/tenant-service
      dockerfile: Dockerfile
    image: platform_tenant:local
    container_name: platform_tenant
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}

    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  billing-service:
    build:
      context: ../minikosbreb/billing-service
      dockerfile: Dockerfile
    image: platform_billing:local
    container_name: platform_billing
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      PLATFORM_STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      PLATFORM_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      PLATFORM_STRIPE_WEBHOOK_SECRET: ${WEBHOOK_SECRET_KEY}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  payment-service:
    build:
      context: ../minikosbreb/payment-service
      dockerfile: Dockerfile
    image: platform_payment:local
    container_name: platform_payment
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      PAYMENT_MASTER_KEY: ${PAYMENT_MASTER_KEY}
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/actuator/health || exit 1"]
